<!DOCTYPE html>
<html>
<head>
    <title>EV Skill Gap Analysis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #00c6ff, #0072ff, #00c9ff, #92fe9d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        .container {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            width: 550px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 0 15px #555;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .button-row {
            display: flex;
            justify-content: space-between;
        }
        button {
            margin-top: 15px;
            padding: 12px;
            width: 48%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<!-- Page 1: Student Name -->
<div class="container" id="page1">
    <h2>Step 1: Enter Your Name</h2>
    <label>Student Name:</label>
    <input type="text" id="studentName">
    <div class="button-row">
        <button onclick="goToPage2()">Next</button>
    </div>
</div>

<!-- Page 2: Known Skills + Desired Field -->
<div class="container" id="page2" style="display:none;">
    <h2>Step 2: Enter Your Known Skills</h2>
    <label>Current Skills (comma separated):</label>
    <textarea id="currentSkills" placeholder="e.g., CAD, MATLAB, Battery Testing"></textarea>
    <label>Choose Desired Field:</label>
    <select id="field">
        <option value="Automotive Engineering">Automotive Engineering</option>
        <option value="EV Battery Technology">EV Battery Technology</option>
        <option value="EV Software & Electronics">EV Software & Electronics</option>
        <option value="EV Supply Chain">EV Supply Chain</option>
    </select>
    <div class="button-row">
        <button onclick="backToPage1()">Back</button>
        <button onclick="goToPage3()">Next</button>
    </div>
</div>

<!-- Page 3: Missing Skills -->
<div class="container" id="page3" style="display:none;">
    <h2>Step 3: Missing Skills</h2>
    <div id="missingSkillsOutput"></div>
    <div class="button-row">
        <button onclick="backToPage2()">Back</button>
        <button onclick="goToPage4()">Next</button>
    </div>
</div>

<!-- Page 4: Recommended Companies -->
<div class="container" id="page4" style="display:none;">
    <h2>Step 4: Recommended Companies</h2>
    <div id="companyOutput"></div>
    <div class="button-row">
        <button onclick="backToPage3()">Back</button>
    </div>
</div>

<script>
    let studentName = "";
    let currentSkills = [];
    let field = "";

    // Required skills for each EV-related field
    const requiredSkills = {
        "Automotive Engineering": ["CAD Design", "Vehicle Dynamics", "Manufacturing Processes", "Quality Control", "Lean Production"],
        "EV Battery Technology": ["Battery Chemistry", "Thermal Management", "Battery Testing", "Energy Storage Systems", "Safety Standards"],
        "EV Software & Electronics": ["Embedded Systems", "Power Electronics", "Control Systems", "CAN Protocols", "IoT Integration"],
        "EV Supply Chain": ["Logistics", "Procurement", "Supplier Management", "Sustainability", "Inventory Optimization"]
    };

    // Core companies in automotive & EV ecosystem
    const companies = {
        "Automotive Engineering": ["Toyota", "Ford", "Volkswagen", "Tata Motors"],
        "EV Battery Technology": ["CATL", "LG Chem", "Panasonic", "BYD"],
        "EV Software & Electronics": ["Tesla", "Bosch", "NXP Semiconductors", "Continental"],
        "EV Supply Chain": ["DHL Supply Chain", "Mahindra Logistics", "Flex", "Siemens"]
    };

    function goToPage2() {
        studentName = document.getElementById("studentName").value.trim();
        if(studentName === "") {
            alert("Please enter your name.");
            return;
        }
        document.getElementById("page1").style.display = "none";
        document.getElementById("page2").style.display = "block";
    }

    function backToPage1() {
        document.getElementById("page2").style.display = "none";
        document.getElementById("page1").style.display = "block";
    }

    function goToPage3() {
        currentSkills = document.getElementById("currentSkills").value.split(",").map(s => s.trim());
        field = document.getElementById("field").value;

        let neededSkills = requiredSkills[field];
        let missingSkills = neededSkills.filter(skill => !currentSkills.includes(skill));

        let priority;
        if (missingSkills.length > 3) priority = "High";
        else if (missingSkills.length === 2) priority = "Medium";
        else if (missingSkills.length === 1) priority = "Low";
        else priority = "None – You’re ready!";

        document.getElementById("missingSkillsOutput").innerHTML = `
            <h3>Hello, ${studentName}!</h3>
            <p><strong>Desired Field:</strong> ${field}</p>
            <p><strong>Missing Skills:</strong></p>
            <ul>${missingSkills.length > 0 ? missingSkills.map(skill => `<li>${skill}</li>`).join("") : "<li>No missing skills!</li>"}</ul>
            <p><strong>AI Priority Level:</strong> ${priority}</p>
        `;

        document.getElementById("page2").style.display = "none";
        document.getElementById("page3").style.display = "block";
    }

    function backToPage2() {
        document.getElementById("page3").style.display = "none";
        document.getElementById("page2").style.display = "block";
    }

    function goToPage4() {
        let recommendedCompanies = companies[field];
        document.getElementById("companyOutput").innerHTML = `
            <h3>Recommended Companies in ${field}:</h3>
            <ul>${recommendedCompanies.map(c => `<li>${c}</li>`).join("")}</ul>
        `;
        document.getElementById("page3").style.display = "none";
        document.getElementById("page4").style.display = "block";
    }

    function backToPage3() {
        document.getElementById("page4").style.display = "none";
        document.getElementById("page3").style.display = "block";
    }
</script>

</body>
</html>
